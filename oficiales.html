<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficiales - LINFAAAC</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #0A2540;
            --accent: #C9A227;
            --dark: #0a0e17;
            --darker: #06090f;
            --card-bg: #111827;
            --card-border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #059669;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--darker);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: var(--primary);
            border-bottom: 3px solid var(--accent);
        }

        header h1 { 
            font-size: 2rem; 
            color: #f8fafc; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800;
        }

        header p { 
            color: var(--text-secondary); 
            margin-top: 8px; 
            font-size: 1.1rem; 
        }

        .upload-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            border: 1px solid var(--card-border);
        }

        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 10px;
            padding: 35px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            background: var(--dark);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(201,162,39,0.05);
        }

        .drop-zone p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .drop-zone .file-types {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #fileInput { display: none; }

        .auto-load-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-success {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .status-info {
            background: rgba(148,163,184,0.1);
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
        }

        .filter-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid var(--card-border);
        }

        .day-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .day-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .location {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #f8fafc;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #searchInput {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.1rem;
            border: 2px solid #334155;
            border-radius: 10px;
            background: var(--dark);
            color: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }

        #searchInput:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px rgba(201,162,39,0.15); 
        }

        #searchInput::placeholder { 
            color: #64748b; 
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: var(--dark);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            font-weight: 500;
        }

        .stat-pill strong { 
            color: var(--accent); 
        }

        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .assignment-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid;
        }

        .assignment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .field-name {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-badge {
            background: var(--dark);
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 1px solid var(--card-border);
            color: #f8fafc;
        }

        .card-body {
            padding: 22px;
        }

        .officials-pair {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            padding: 8px 0;
            color: #f8fafc;
            letter-spacing: 1px;
        }

        .officials-pair .highlight {
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251,191,36,0.3);
        }

        .vs {
            color: #64748b;
            font-size: 0.85rem;
            margin: 0 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .companion-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.3);
        }

        .card-footer {
            padding: 14px 22px;
            background: var(--dark);
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            font-weight: 600;
            border-top: 1px solid var(--card-border);
        }

        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
            font-size: 1.1rem;
            grid-column: 1 / -1;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .no-results h3 {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        /* Colores por campo - hasta 12 campos */
        .campo-1 { border-left-color: #f59e0b; }
        .campo-1 .field-name { color: #fbbf24; }

        .campo-2 { border-left-color: #ef4444; }
        .campo-2 .field-name { color: #f87171; }

        .campo-3 { border-left-color: #22c55e; }
        .campo-3 .field-name { color: #4ade80; }

        .campo-4 { border-left-color: #3b82f6; }
        .campo-4 .field-name { color: #60a5fa; }

        .campo-5 { border-left-color: #a855f7; }
        .campo-5 .field-name { color: #c084fc; }

        .campo-6 { border-left-color: #06b6d4; }
        .campo-6 .field-name { color: #22d3ee; }

        .campo-7 { border-left-color: #ec4899; }
        .campo-7 .field-name { color: #f472b6; }

        .campo-8 { border-left-color: #6366f1; }
        .campo-8 .field-name { color: #818cf8; }

        .campo-9 { border-left-color: #f97316; }
        .campo-9 .field-name { color: #fb923c; }

        .campo-10 { border-left-color: #14b8a6; }
        .campo-10 .field-name { color: #2dd4bf; }

        .campo-11 { border-left-color: #e11d48; }
        .campo-11 .field-name { color: #fb7185; }

        .campo-12 { border-left-color: #8b5cf6; }
        .campo-12 .field-name { color: #a78bfa; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .assignments-grid { grid-template-columns: 1fr; }
            .officials-pair { font-size: 1.2rem; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header>
        <h1>LINFAAAC Estatal</h1>
        <p>Asignacion de Oficiales Arbitrales</p>
    </header>

    <div class="container">
        <div class="upload-section">
            <div id="autoStatus"></div>
            <div class="drop-zone" id="dropZone">
                <p><strong>Arrastra aqui tu archivo Excel de asignaciones</strong> o haz clic para seleccionarlo</p>
                <p class="file-types">Formatos soportados: .xlsx, .xls, .csv</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            </div>
        </div>

        <div class="filter-section">
            <div class="day-info">
                <span class="day-badge" id="dayLabel">Cargando...</span>
                <span class="location" id="locationLabel">Esperando archivo</span>
            </div>
            <label for="searchInput">Buscar oficial por nombre:</label>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Escribe tu nombre (ej: Abi, Jordan, Nico, Pam, Gael...)"
                autocomplete="off"
            >
            <div class="stats">
                <div class="stat-pill">Total asignaciones: <strong id="totalCount">0</strong></div>
                <div class="stat-pill">Mostrando: <strong id="showingCount">0</strong></div>
                <div class="stat-pill">Campos activos: <strong id="fieldsCount">0</strong></div>
            </div>
        </div>

        <div id="assignmentsContainer" class="assignments-grid"></div>
    </div>

    <script>
        let allAssignments = [];

        const container = document.getElementById('assignmentsContainer');
        const searchInput = document.getElementById('searchInput');
        const totalCount = document.getElementById('totalCount');
        const showingCount = document.getElementById('showingCount');
        const fieldsCount = document.getElementById('fieldsCount');
        const dayLabel = document.getElementById('dayLabel');
        const locationLabel = document.getElementById('locationLabel');
        const autoStatus = document.getElementById('autoStatus');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // Cargar horario.xls automaticamente
        window.addEventListener('DOMContentLoaded', () => {
            fetch('./horario.xls')
                .then(response => {
                    if (!response.ok) throw new Error('No encontrado');
                    return response.arrayBuffer();
                })
                .then(data => {
                    processExcel(data, 'horario.xls');
                    autoStatus.innerHTML = '<div class="auto-load-status status-success">Archivo horario.xls cargado automaticamente</div>';
                })
                .catch(() => {
                    autoStatus.innerHTML = '<div class="auto-load-status status-info">No se encontro horario.xls. Sube tu archivo manualmente.</div>';
                    dayLabel.textContent = 'Sin datos';
                    locationLabel.textContent = 'Sube un archivo para comenzar';
                    showEmptyState();
                });
        });

        // Drag and drop
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                processExcel(e.target.result, file.name);
                autoStatus.innerHTML = '<div class="auto-load-status status-success">Archivo cargado: ' + file.name + '</div>';
            };
            reader.readAsArrayBuffer(file);
        }

        function processExcel(data, filename) {
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

            parseScheduleData(jsonData);
        }

        function parseScheduleData(rows) {
            allAssignments = [];
            let headerRowIndex = -1;
            let dayName = 'SABADO';
            let locationName = 'Deportivo Caracoles';

            // Buscar metadatos en primeras filas
            for (let i = 0; i < Math.min(rows.length, 5); i++) {
                const row = rows[i];
                if (!row) continue;

                const firstCell = String(row[0] || '').trim();
                const upperCell = firstCell.toUpperCase();

                // Detectar dia
                if (upperCell && !upperCell.includes('HORARIO') && !upperCell.includes(':') && 
                    !upperCell.includes('CAMPO') && upperCell.length > 2 &&
                    (upperCell === 'SABADO' || upperCell === 'DOMINGO' || upperCell === 'VIERNES' ||
                     upperCell === 'LUNES' || upperCell === 'MARTES' || upperCell === 'MIERCOLES' ||
                     upperCell === 'JUEVES')) {
                    dayName = firstCell;
                }

                // Detectar ubicacion
                const rowText = row.map(c => String(c).toUpperCase()).join(' ');
                if (rowText.includes('DEPORTIVO') || rowText.includes('CARACOLES') || 
                    rowText.includes('ESTADIO') || rowText.includes('CAMPO')) {
                    const loc = row.find(c => String(c).length > 5 && String(c).toUpperCase() !== 'SABADO' && 
                                      String(c).toUpperCase() !== 'DOMINGO');
                    if (loc) locationName = String(loc).trim();
                }
            }

            // Encontrar fila de encabezados
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                const firstCell = String(row[0] || '').trim().toUpperCase();
                if (firstCell === 'HORARIO' || firstCell.includes('HORA')) {
                    headerRowIndex = i;
                    break;
                }
            }

            if (headerRowIndex === -1) {
                showError('No se encontro la columna HORARIO. Verifica el formato.');
                return;
            }

            const headerRow = rows[headerRowIndex];
            const fields = [];

            // Identificar columnas de campos (hasta 12)
            for (let j = 1; j < headerRow.length; j++) {
                const cell = String(headerRow[j] || '').trim().toUpperCase();
                const match = cell.match(/CAMPO\s*(\d+)/i);
                if (match) {
                    const fieldNum = parseInt(match[1]);
                    if (fieldNum >= 1 && fieldNum <= 12) {
                        fields.push({ index: j, number: fieldNum });
                    }
                }
            }

            if (fields.length === 0) {
                showError('No se encontraron columnas CAMPO. Asegurate de tener CAMPO 1, CAMPO 2, etc.');
                return;
            }

            // Procesar filas de asignaciones
            for (let i = headerRowIndex + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                const horario = String(row[0] || '').trim();
                if (!horario || !horario.includes('-')) continue;

                fields.forEach(field => {
                    const cellValue = String(row[field.index] || '').trim();
                    if (!cellValue) return;

                    // Formato: "OFICIAL1-OFICIAL2"
                    const parts = cellValue.split('-').map(p => p.trim().toUpperCase());
                    if (parts.length >= 2) {
                        allAssignments.push({
                            campo: field.number,
                            horario: horario,
                            oficial1: parts[0],
                            oficial2: parts[1],
                            pareja: cellValue.toUpperCase()
                        });
                    }
                });
            }

            dayLabel.textContent = dayName;
            locationLabel.textContent = locationName;

            if (allAssignments.length === 0) {
                showError('No se encontraron asignaciones. Formato esperado: OFICIAL1-OFICIAL2');
                return;
            }

            renderAssignments(searchInput.value);
        }

        function renderAssignments(filter = '') {
            const term = filter.toLowerCase().trim();

            const filtered = term === '' ? [] : allAssignments.filter(a => 
                a.oficial1.toLowerCase().includes(term) || 
                a.oficial2.toLowerCase().includes(term)
            );

            // Ordenar por horario
            filtered.sort((a, b) => {
                const timeA = a.horario.split('-')[0].trim();
                const timeB = b.horario.split('-')[0].trim();
                return timeA.localeCompare(timeB);
            });

            showingCount.textContent = filtered.length;
            totalCount.textContent = allAssignments.length;
            fieldsCount.textContent = [...new Set(allAssignments.map(a => a.campo))].length;

            if (filtered.length === 0) {
                if (term === '') {
                    showEmptyState();
                } else {
                    container.innerHTML = '<div class="no-results"><h3>Sin resultados</h3><p>No se encontraron asignaciones para "' + escapeHtml(filter) + '"</p></div>';
                }
                return;
            }

            container.innerHTML = filtered.map(a => {
                const searchTerm = term.toLowerCase();
                const oficial1Match = a.oficial1.toLowerCase().includes(searchTerm);
                const oficial2Match = a.oficial2.toLowerCase().includes(searchTerm);

                const oficial1Class = oficial1Match ? 'highlight' : '';
                const oficial2Class = oficial2Match ? 'highlight' : '';

                const companion = oficial1Match ? a.oficial2 : a.oficial1;

                return '<div class="assignment-card campo-' + a.campo + '">' +
                    '<div class="card-header">' +
                        '<span class="field-name">Campo ' + a.campo + '</span>' +
                        '<span class="time-badge">' + escapeHtml(a.horario) + '</span>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<div class="officials-pair">' +
                            '<span class="' + oficial1Class + '">' + escapeHtml(a.oficial1) + '</span>' +
                            ' <span class="vs">y</span> ' +
                            '<span class="' + oficial2Class + '">' + escapeHtml(a.oficial2) + '</span>' +
                        '</div>' +
                        '<div style="text-align:center;">' +
                            '<span class="companion-badge">Companero: ' + escapeHtml(companion) + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="card-footer">' +
                        escapeHtml(dayLabel.textContent) + ' &bull; ' + escapeHtml(locationLabel.textContent) +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showEmptyState() {
            container.innerHTML = '<div class="no-results"><h3>Busqueda de asignaciones</h3><p>Escribe tu nombre para ver tus asignaciones de arbitraje</p></div>';
            showingCount.textContent = '0';
            totalCount.textContent = allAssignments.length;
            fieldsCount.textContent = [...new Set(allAssignments.map(a => a.campo))].length;
        }

        function showError(msg) {
            container.innerHTML = '<div class="no-results" style="border-left: 4px solid #ef4444;"><h3 style="color: #f87171;">Error al procesar archivo</h3><p>' + escapeHtml(msg) + '</p></div>';
        }

        searchInput.addEventListener('input', (e) => {
            renderAssignments(e.target.value);
        });
    </script>
</body>
</html>
